name: build

# CI du dépôt public cauchy-haskell (forme de release fusionnée à 3 paquets).
# Déposée par fuse.mjs au moment de la publication ; jamais éditée à la main
# dans le dépôt public. Prouve que la forme publiée build et teste vert, et
# sert de détecteur de dérive des gabarits.

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Référents Singular + numpy
        run: |
          sudo apt-get update
          sudo apt-get install -y singular python3-numpy

      # La version GHC n'est pas codée en dur : on la lit de tested-with (source
      # unique). Le plan résolu correspond alors aux versions que les bornes
      # promettent, et le check des plafonds (ci-dessous) compare au vrai testé.
      - name: GHC = tested-with
        id: ghc
        run: echo "v=$(grep -hoE 'GHC *== *[0-9.]+' cauchy/cauchy.cabal | grep -oE '[0-9.]+' | head -1)" >> "$GITHUB_OUTPUT"

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ steps.ghc.outputs.v }}
          cabal-version: '3.14'

      - name: Build + test (3 paquets)
        env:
          CAUCHY_ORACLE_SINGULAR: '1'
          CAUCHY_ORACLE_NUMPY: '1'
        run: |
          cabal update
          cabal build all
          cabal test all --test-show-details=direct

      # Filet des bornes contre le plan réellement résolu : plafonds = testé
      # (la couche « valeur » de PVP — le geste de gen-bounds, automatisé). Le
      # freeze fige les versions résolues ; node est fourni par le runner.
      - name: Bornes — plafonds vs testé
        run: |
          cabal freeze
          node check-bounds.mjs . cabal.project.freeze
